services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./drupal:/var/www:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped
    networks:
      - bearcom

  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./drupal:/var/www:cached
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - bearcom
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-bearcom}
      - MYSQL_USER=${MYSQL_USER:-bearcom}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-bearcom_db_pass}
      - MYSQL_HOST=db
      - DRUPAL_HASH_SALT=${DRUPAL_HASH_SALT:-CHANGE_ME}

  db:
    image: mariadb:10.11
    volumes:
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-bearcom_root_pass}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-bearcom}
      - MYSQL_USER=${MYSQL_USER:-bearcom}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-bearcom_db_pass}
    restart: unless-stopped
    networks:
      - bearcom
    # Avoid mbind warnings on Linux
    security_opt:
      - seccomp:unconfined

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - bearcom

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_PORT:-8025}:8025"
    restart: unless-stopped
    networks:
      - bearcom

volumes:
  db-data:

networks:
  bearcom:
    driver: bridge
